[accessibility]
ui_scale = 1.0

[audio]
enable_overdrive = false
enable_sounds = false
sound_volume = 0.5

[backdrop]
enabled = true

[bar.main]
auto_hide = false
background_opacity = 0.74999998323619366
capsule = true
capsule_opacity = 0.89999997988343239
capsule_padding = 4.0
capsule_thickness = 0.64999998919665813
center = [ "workspaces" ]
concave_edge_corners = false
end = [ "battery", "tray", "notifications", "network", "bluetooth", "volume", "control-center" ]
margin_edge = 5
margin_ends = 10
margin_h = 1000
margin_v = 5
padding = 6
position = "top"
radius = 12
radius_top_left = 12
radius_top_right = 12
reserve_space = true
scale = 1.0
shadow = true
show_on_workspace_switch = true
start = [ "launcher", "clock", "sysmon", "active_window" ]
thickness = 30
widget_spacing = 2

[control_center]
width = 800

[desktop_widgets]
enabled = false

[dock]
active_monitor_only = true
auto_hide = true
background_opacity = 1.0
enabled = false
launcher_custom_image = "/nix/store/ywlhln5hh4pgb30vvaxpvqk62g5v9wjk-noctalia-5.0.0/share/noctalia/assets/images/distros/nixos.svg"
launcher_custom_image_colorize = true
launcher_position = "start"
pinned = []
position = "bottom"

[idle.behavior.lock]
action = "lock"
enabled = false
timeout = 660

[idle.behavior.screen-off]
action = "screen_off"
enabled = false
timeout = 600

[keybinds]
cancel = [ "escape" ]
down = [ "down" ]
left = [ "left" ]
right = [ "right" ]
up = [ "up" ]
validate = [ "return", "kp_enter" ]

[location]
address = "Rockford, IL"
auto_locate = false

[lockscreen]
blur_intensity = 0.14999999999999999
blurred_desktop = true
enabled = true
tint_intensity = 0.0

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@eDP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 768.0
    cy = 745.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        center_password_text = false
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[nightlight]
enabled = false
force = false
temperature_day = 6500
temperature_night = 4000

[notification]
background_opacity = 1.0
enable_daemon = true
layer = "overlay"

[osd]
background_opacity = 1.0
orientation = "horizontal"
position = "top_right"

    [osd.kinds]
    brightness = true
    volume = true
    volume_input = true
    volume_output = true

[plugins]
enabled = [ "noctalia/translator" ]

[shell]
avatar_path = "/home/craig/Pictures/NixOS.png"
clipboard_auto_paste = "ctrl_v"
clipboard_enabled = true
corner_radius_scale = 1.0
date_format = "%a, %b %d"
font_family = "Noto Sans"
telemetry_enabled = false
time_format = "{:%H:%M}"

    [shell.animation]
    enabled = true
    speed = 1.0

    [shell.launcher]
    categories = false

    [shell.mpris]
    blacklist = []

    [shell.panel]
    borders = false
    clipboard_placement = "centered"
    control_center_placement = "attached"
    launcher_placement = "attached"
    open_near_click_control_center = false
    session_placement = "centered"
    shadow = true
    transparency_mode = "soft"
    wallpaper_placement = "attached"

    [shell.shadow]
    alpha = 0.55000000000000004
    direction = "down_right"

[system.monitor]
enabled = true

[theme]
builtin = "Tokyo-Night"
community_palette = "Atuel"
custom_palette = "Tokyo-Night"
mode = "dark"
pure_black_dark = false
source = "builtin"
wallpaper_scheme = "m3-content"

    [theme.templates]
    builtin_ids = [ "alacritty", "btop", "cava", "gtk3", "gtk4", "helix", "kitty", "niri", "wezterm" ]
    community_ids = [ "neovim", "vscode", "fuzzel", "yazi" ]
    enable_builtin_templates = true
    enable_community_templates = true

[wallpaper]
directory = "/home/craig/Pictures/wallpaper"
edge_smoothness = 0.050000000000000003
enabled = true
fill_color = "#000000"
fill_mode = "fit"
transition = [ "fade", "disc", "stripes", "wipe", "honeycomb" ]
transition_duration = 1500
transition_on_startup = false

    [wallpaper.automation]
    enabled = false
    interval_minutes = 5
    order = "random"
    recursive = true

    [wallpaper.default]
    path = "/home/craig/Pictures/wallpaper/021.jpg"

    [wallpaper.last]
    path = "/home/craig/Pictures/wallpaper/021.jpg"

    [wallpaper.monitors.eDP-1]
    path = "/home/craig/Pictures/wallpaper/021.jpg"

[weather]
effects = true
enabled = true
unit = "imperial"

[widget.active_window]
display = "icon_and_text"
icon_size = 16.0
max_length = 145.0
title_scroll = "on_hover"

[widget.battery]
display_mode = "graphic"

[widget.brightness]
show_label = false

[widget.clock]
font_weight = 700
format = "{:%H:%M %a, %b %d}"
tooltip_format = "{:%H:%M %a, %b %d}"

[widget.launcher]
capsule = true
capsule_opacity = 0.35000000000000003
capsule_padding = 2
custom_image = "/home/craig/Pictures/NixOS.png"
custom_image_colorize = false
scale = 1.1500000000000001

[widget.media]
art_size = 16.0
max_length = 145.0
title_scroll = "on_hover"

[widget.network]
show_label = false

[widget.volume]
show_label = false

[widget.workspaces]
display = "none"
